name: "Run CI"

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install

      - name: Install Graphviz
        run: sudo apt-get install -y graphviz

      - name: Build TypeScript
        run: npm run build

      - name: Run lint
        run: npm run lint

      - name: Run Dependency Analysis
        run: npm run depcruise

      - name: Run tests with coverage
        run: npm run coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./coverage

      - name: Generate Dependency Graph
        run: |
          # 再生成前に、コミット済み SVG の構造情報(ノード/エッジの <title>)を控えておく
          grep -o '<title>[^<]*</title>' dependency-graph.svg | sort > /tmp/committed-graph-titles.txt
          npm run dependency-graph

      # コミット済みの dependency-graph.svg が実際の依存関係より古いままだとここで失敗する。
      # モジュールを追加/削除したら `npm run dependency-graph` を実行して SVG も一緒にコミットすること。
      # graphviz のバージョン差によるレイアウト座標の違いに影響されないよう、
      # SVG 全体ではなくノード/エッジの <title>(構造情報)だけを比較する。
      - name: Check Dependency Graph is up to date
        run: |
          grep -o '<title>[^<]*</title>' dependency-graph.svg | sort > /tmp/current-graph-titles.txt
          diff -u /tmp/committed-graph-titles.txt /tmp/current-graph-titles.txt

      - name: Upload Dependency Graph
        uses: actions/upload-artifact@v4
        with:
          name: dependency-graph
          path: dependency-graph.svg
